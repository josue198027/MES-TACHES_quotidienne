// =============== UTILITAIRES ===============
function dateKey(date) {
  const d = new Date(date);
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

function formatDate(date) {
  const months = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
  return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
}

function getDayLabel(date) {
  const today = new Date();
  today.setHours(0,0,0,0);
  const target = new Date(date);
  target.setHours(0,0,0,0);
  const diff = Math.round((target - today) / 86400000);
  if (diff === 0) return "Aujourd'hui";
  if (diff === 1) return "Demain";
  if (diff === -1) return "Hier";
  const days = ["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
  return days[date.getDay()];
}

function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return "Bonjour";
  if (h < 18) return "Bon après-midi";
  return "Bonsoir";
}

function currentTimeString() {
  const now = new Date();
  return `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
}

// Convertit une date en format ISO yyyy-mm-dd (pour input type="date")
function dateToIso(date) {
  const d = new Date(date);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

// Convertit une chaîne ISO yyyy-mm-dd en objet Date (minuit local)
function isoToDate(iso) {
  const [y, m, d] = iso.split("-").map(Number);
  return new Date(y, m - 1, d);
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

// =============== STOCKAGE ===============
function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      state.tasksByDate = JSON.parse(raw);
      return;
    }
  } catch (e) { console.error("Lecture impossible", e); }
  // Tâches par défaut au premier lancement

      { id: 1, title: "emplettte",        priority: "moyenne", category: "maison", done: false, reminderTime: null, notifiedDate: null },
      { id: 2, title: "Faire les courses", priority: "haute",   category: "maison", done: false, reminderTime: null, notifiedDate: null },
      { id: 3, title: "Faire du sport",    priority: "basse",   category: "sante",  done: false, reminderTime: null, notifiedDate: null },
    ],
  };
}

function saveToStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.tasksByDate));
  } catch (e) { console.error("Sauvegarde impossible", e); }
}

// =============== SON ===============
function ensureAudioContext() {
  try {
    if (!audioCtx) {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (Ctx) audioCtx = new Ctx();
    }
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  } catch (e) {}
}

function playAlarm() {
  ensureAudioContext();
  if (!audioCtx) return;
  try {
    const beep = (frequency, startOffset, duration) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = "sine";
      osc.frequency.value = frequency;
      const start = audioCtx.currentTime + startOffset;
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(0.25, start + 0.04);
      gain.gain.linearRampToValueAtTime(0.25, start + duration - 0.04);
      gain.gain.linearRampToValueAtTime(0, start + duration);
      osc.start(start);
      osc.stop(start + duration + 0.05);
    };
    beep(880, 0, 0.2);
    beep(1175, 0.25, 0.2);
    beep(880, 0.55, 0.2);
    beep(1175, 0.8, 0.35);
  } catch (e) { console.error(e); }
}

function startAlarmLoop() {
  if (alarmInterval) return;
  playAlarm();
  alarmInterval = setInterval(playAlarm, 2500);
}

function stopAlarmLoop() {
  if (alarmInterval) {
    clearInterval(alarmInterval);
    alarmInterval = null;
  }
}

// =============== NOTIFICATIONS ===============
async function requestNotifPermission() {
  if (typeof Notification === "undefined") return;
  ensureAudioContext();
  try {
    const result = await Notification.requestPermission();
    state.notifPermission = result;
    state.showNotifBanner = false;
    render();
  } catch (e) {}
}

function checkReminders() {
  const now = new Date();
  const todayKey = dateKey(now);
  const currentTime = currentTimeString();
  const todayTasks = state.tasksByDate[todayKey];
  if (!todayTasks) return;

  let triggered = null;
  let changed = false;
  state.tasksByDate[todayKey] = todayTasks.map(t => {
    if (!t.done && t.reminderTime && t.notifiedDate !== todayKey && t.reminderTime <= currentTime) {
      if (typeof Notification !== "undefined" && Notification.permission === "granted") {
        try {
          new Notification("Rappel : " + t.title, {
            body: `Il est ${t.reminderTime}, c'est le moment de s'y mettre.`,
            tag: `tache-${t.id}`,
          });
        } catch (e) {}
      }
      triggered = t;
      changed = true;
      return { ...t, notifiedDate: todayKey };
    }
    return t;
  });

  if (changed) saveToStorage();
  if (triggered) {
    startAlarmLoop();
    state.activeAlarm = triggered;
    render();
  }
}

// =============== ACTIONS ===============
function changeDay(delta) {
  const d = new Date(state.currentDate);
  d.setDate(d.getDate() + delta);
  state.currentDate = d;
  render();
}

function toggleTask(id) {
  const key = dateKey(state.currentDate);
  if (state.activeAlarm && state.activeAlarm.id === id) {
    stopAlarmLoop();
    state.activeAlarm = null;
  }
  state.tasksByDate[key] = (state.tasksByDate[key] || []).map(t =>
    t.id === id ? { ...t, done: !t.done } : t
  );
  saveToStorage();
  render();
}

function deleteTask(id) {
  const key = dateKey(state.currentDate);
  state.tasksByDate[key] = (state.tasksByDate[key] || []).filter(t => t.id !== id);
  saveToStorage();
  render();
}

function addTask() {
  const title = state.newTaskTitle.trim();
  if (!title) return;
  const taskDate = state.newTaskDate ? isoToDate(state.newTaskDate) : state.currentDate;
  const newKey = dateKey(taskDate);

  if (state.editingTaskId !== null) {
    // Mode édition : trouve la tâche dans toutes les dates et la met à jour
    let oldKey = null;
    for (const k of Object.keys(state.tasksByDate)) {
      if (state.tasksByDate[k].some(t => t.id === state.editingTaskId)) {
        oldKey = k;
        break;
      }
    }
    if (oldKey) {
      const existing = state.tasksByDate[oldKey].find(t => t.id === state.editingTaskId);
      const updated = {
        ...existing,
        title,
        priority: state.newTaskPriority,
        category: state.newTaskCategory,
        reminderTime: state.newTaskReminder || null,
        note: state.newTaskNote.trim() || null,
        // Réinitialise notifiedDate si l'heure de rappel a changé
        notifiedDate: existing.reminderTime !== (state.newTaskReminder || null) ? null : existing.notifiedDate,
      };
      // Si la date a changé, déplacer la tâche
      if (oldKey !== newKey) {
        state.tasksByDate[oldKey] = state.tasksByDate[oldKey].filter(t => t.id !== state.editingTaskId);
        if (state.tasksByDate[oldKey].length === 0) delete state.tasksByDate[oldKey];
        state.tasksByDate[newKey] = [...(state.tasksByDate[newKey] || []), updated];
      } else {
        state.tasksByDate[newKey] = state.tasksByDate[newKey].map(t =>
          t.id === state.editingTaskId ? updated : t
        );
      }
    }
    state.currentDate = taskDate;
  } else {
    // Mode création
    const newTask = {
      id: Date.now(),
      title,
      priority: state.newTaskPriority,
      category: state.newTaskCategory,
      done: false,
      reminderTime: state.newTaskReminder || null,
      note: state.newTaskNote.trim() || null,
      notifiedDate: null,
    };
    state.tasksByDate[newKey] = [...(state.tasksByDate[newKey] || []), newTask];
    state.currentDate = taskDate;
  }

  const hadReminder = !!state.newTaskReminder;
  state.newTaskTitle = "";
  state.newTaskPriority = "moyenne";
  state.newTaskCategory = "perso";
  state.newTaskReminder = "";
  state.newTaskDate = "";
  state.newTaskNote = "";
  state.editingTaskId = null;
  state.showAddForm = false;
  if (hadReminder && state.notifPermission === "default" && !state.bannerDismissed) {
    state.showNotifBanner = true;
  }
  saveToStorage();
  render();
}

function startEditTask(id) {
  // Trouve la tâche et sa date
  for (const k of Object.keys(state.tasksByDate)) {
    const task = state.tasksByDate[k].find(t => t.id === id);
    if (task) {
      state.editingTaskId = id;
      state.newTaskTitle = task.title;
      state.newTaskPriority = task.priority;
      state.newTaskCategory = task.category;
      state.newTaskReminder = task.reminderTime || "";
      state.newTaskNote = task.note || "";
      // Reconstitue la date ISO depuis la clé "yyyy-m-d" (m est 0-indexé dans dateKey)
      const [y, m, d] = k.split("-").map(Number);
      state.newTaskDate = `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      state.showAddForm = true;
      render();
      // Scroll vers le formulaire
      setTimeout(() => {
        const input = document.getElementById("task-title-input");
        if (input) input.scrollIntoView({ behavior: "smooth", block: "center" });
      }, 50);
      break;
    }
  }
}

      <div class="flex justify-between items-center mb-3">

function renderStatusFilters() {
  const tasks = state.tasksByDate[dateKey(state.currentDate)] || [];
  const counts = {
    afaire: tasks.filter(t => !t.done).length,
    termine: tasks.filter(t => t.done).length,
  };
  const tabs = [
    { key: "afaire", label: "À faire" },
    { key: "termine", label: "Terminé" },
  ];
  const buttons = tabs.map(t => {
    const active = state.filter === t.key;
    const cls = active ? "bg-white text-slate-900 shadow-sm" : "text-slate-600 hover:text-slate-900";
    return `
      <button data-action="set-filter" data-value="${t.key}" class="py-2.5 rounded-xl text-sm font-medium ${cls} transition-all flex items-center justify-center gap-1.5">
        ${t.label}<span class="text-xs text-slate-400">${counts[t.key]}</span>
      </button>
    `;
  }).join("");
  return `<div class="bg-slate-200/60 rounded-2xl p-1 mb-3 grid grid-cols-2 gap-1">${buttons}</div>`;
}

function renderCategoryFilters() {
  const tasks = state.tasksByDate[dateKey(state.currentDate)] || [];
  const visible = state.filter === "termine" ? tasks.filter(t => t.done) : tasks.filter(t => !t.done);
  const cc = { toutes: visible.length };
  Object.keys(CATEGORIES).forEach(k => {
    cc[k] = visible.filter(t => t.category === k).length;
  });

  const allActive = state.categoryFilter === "toutes";
  const allCls = allActive ? "bg-slate-900 text-white border-slate-900" : "bg-white text-slate-600 border-slate-200 hover:border-slate-300";

  let html = `
    <button data-action="set-cat-filter" data-value="toutes" class="px-3 py-1.5 rounded-full text-xs font-medium border ${allCls} transition-all flex items-center gap-1.5">
      <i data-lucide="layers" class="w-3.5 h-3.5"></i>Toutes
      <span class="${allActive ? 'text-slate-300' : 'text-slate-400'}">${cc.toutes}</span>
    </button>
  `;

  Object.entries(CATEGORIES).forEach(([key, cat]) => {
    const active = state.categoryFilter === key;
    const cls = active
      ? `${cat.bg} ${cat.color} ${cat.ring} border-2`
      : "bg-white text-slate-600 border-slate-200 hover:border-slate-300 border";
    html += `
      <button data-action="set-cat-filter" data-value="${key}" class="px-3 py-1.5 rounded-full text-xs font-medium ${cls} transition-all flex items-center gap-1.5">
        <i data-lucide="${cat.icon}" class="w-3.5 h-3.5"></i>${cat.label}
        <span class="${active ? 'opacity-60' : 'text-slate-400'}">${cc[key]}</span>
      </button>
    `;
  });

  return `
    <div class="flex flex-wrap gap-2 mb-4">${html}</div>
  `;
}

function renderTaskList() {
  const allTasks = state.tasksByDate[dateKey(state.currentDate)] || [];
  let filtered = allTasks;
  if (state.filter === "afaire") filtered = filtered.filter(t => !t.done);
  else if (state.filter === "termine") filtered = filtered.filter(t => t.done);
  if (state.categoryFilter !== "toutes") filtered = filtered.filter(t => t.category === state.categoryFilter);

  if (filtered.length === 0) {
    let msg;
    if (state.filter === "termine") msg = "Aucune tâche terminée";
    else if (state.filter === "afaire") msg = "Tout est fait, bravo !";
    else msg = "Aucune tâche pour ce filtre";
    return `
      <div class="space-y-2">
        <div class="bg-white rounded-2xl p-8 text-center border border-slate-100">
          <div class="w-14 h-14 rounded-full bg-slate-50 flex items-center justify-center mx-auto mb-3">
            <i data-lucide="clipboard-list" class="w-6 h-6 text-slate-300"></i>
          </div>
          <p class="text-sm text-slate-500">${msg}</p>
        </div>
      </div>
    `;
  }

  const items = filtered.map(task => {
    const pri = PRIORITIES[task.priority];
    const cat = CATEGORIES[task.category] || CATEGORIES.perso;
    const checkboxCls = task.done ? "bg-indigo-600 border-indigo-600" : "border-slate-300 hover:border-indigo-500";
    const checkmark = task.done ? `<i data-lucide="check" class="w-3.5 h-3.5 text-white"></i>` : "";
    const titleCls = task.done ? "line-through text-slate-400" : "text-slate-800";
    const reminderHtml = task.reminderTime ? `
      <span class="inline-flex items-center gap-1 text-[11px] font-medium text-slate-500">
        <i data-lucide="clock" class="w-3 h-3"></i>${task.reminderTime}
      </span>` : "";
    const noteIndicator = task.note ? `
      <span class="inline-flex items-center gap-1 text-[11px] font-medium text-slate-500" title="${escapeHtml(task.note)}">
        <i data-lucide="sticky-note" class="w-3 h-3"></i>Note
      </span>` : "";
    const noteBlock = task.note ? `
        <div class="mt-2 ml-9 px-3 py-2 bg-slate-50 rounded-lg border-l-2 border-indigo-300">
          <p class="text-xs text-slate-600 whitespace-pre-wrap">${escapeHtml(task.note)}</p>
        </div>` : "";
    return `
      <div class="group bg-white rounded-2xl border border-slate-100 p-4 hover:shadow-sm transition-all ${task.done ? 'opacity-60' : ''}">
        <div class="flex items-center gap-3">
          <button data-action="toggle" data-id="${task.id}" class="w-6 h-6 rounded-full border-2 flex-shrink-0 flex items-center justify-center transition-all ${checkboxCls}">
            ${checkmark}
          </button>
          <div class="flex-1 min-w-0">
            <span class="text-sm font-medium block truncate ${titleCls}">${escapeHtml(task.title)}</span>
            <div class="flex items-center gap-2 mt-1 flex-wrap">
              <span class="inline-flex items-center gap-1 text-[11px] font-medium ${cat.color}">
                <i data-lucide="${cat.icon}" class="w-3 h-3"></i>${cat.label}
              </span>
              ${reminderHtml}
              ${noteIndicator}
            </div>
          </div>
          <div class="w-2.5 h-2.5 rounded-full ${pri.color} flex-shrink-0"></div>
          <button data-action="edit" data-id="${task.id}" title="Modifier" class="w-8 h-8 rounded-full hover:bg-indigo-50 flex items-center justify-center text-slate-400 hover:text-indigo-600 transition-all flex-shrink-0">
            <i data-lucide="pencil" class="w-4 h-4"></i>
          </button>
          <button data-action="delete" data-id="${task.id}" title="Supprimer" class="w-8 h-8 rounded-full hover:bg-rose-50 flex items-center justify-center text-slate-400 hover:text-rose-500 transition-all flex-shrink-0">
            <i data-lucide="trash-2" class="w-4 h-4"></i>
          </button>
        </div>
        ${noteBlock}
      </div>
    `;
  }).join("");

  return `<div class="space-y-2">${items}</div>`;
}

function renderFooter() {
  const tasks = state.tasksByDate[dateKey(state.currentDate)] || [];
  const total = tasks.length;
  const done = tasks.filter(t => t.done).length;
  const progress = total === 0 ? 0 : Math.round((done / total) * 100);
  const msg = total > 0 && progress === 100
    ? "Excellente journée, tout est terminé !"
    : "Vos tâches sont sauvegardées automatiquement";
  return `<p class="text-center text-sm text-slate-700 font-medium mt-6">${msg}</p>`;
}

  const html = `
    <div class="md:hidden">
      ${renderProfile()}

        ${renderProfile()}
        ${renderHeader()}

      </div>
      <div class="space-y-3">
        ${renderStatusFilters()}
        ${renderCategoryFilters()}
        ${renderTaskList()}
        ${renderFooter()}

  document.getElementById("app").innerHTML = html;

  // Restaure le focus + valeur de l'input si le formulaire est ouvert
  if (state.showAddForm) {
    const input = document.getElementById("task-title-input");
    if (input) {
      input.focus();
      const len = input.value.length;
      input.setSelectionRange(len, len);
    }
  }

  if (window.lucide) lucide.createIcons();
}

// =============== ÉVÉNEMENTS ===============
document.addEventListener("click", (e) => {
  const btn = e.target.closest("[data-action]");
  if (!btn) return;
  const action = btn.dataset.action;
  const value = btn.dataset.value;
  const id = btn.dataset.id ? Number(btn.dataset.id) : null;

  switch (action) {
    case "test-alarm": ensureAudioContext(); playAlarm(); break;
    case "dismiss-alarm": dismissAlarm(); break;
    case "prev-day": changeDay(-1); break;
    case "next-day": changeDay(1); break;
    case "goto-today":
      state.currentDate = new Date();
      render();
      break;
    case "enable-notif": requestNotifPermission(); break;
    case "dismiss-banner":
      state.showNotifBanner = false;
      state.bannerDismissed = true;
      render();
      break;
    case "show-form":
      state.showAddForm = true;
      state.newTaskDate = dateToIso(state.currentDate);
      render();
      break;
    case "hide-form":
      state.showAddForm = false;
      state.newTaskTitle = "";
      state.newTaskReminder = "";
      state.newTaskDate = "";
      state.newTaskNote = "";
      state.editingTaskId = null;
      state.newTaskPriority = "moyenne";
      state.newTaskCategory = "perso";
      render();
      break;
    case "set-cat": state.newTaskCategory = value; render(); break;
    case "set-pri": state.newTaskPriority = value; render(); break;
    case "clear-reminder": state.newTaskReminder = ""; render(); break;
    case "add-task": addTask(); break;
    case "set-filter": state.filter = value; render(); break;
    case "set-cat-filter": state.categoryFilter = value; render(); break;
    case "toggle": toggleTask(id); break;
    case "edit": startEditTask(id); break;
    case "delete": deleteTask(id); break;
  }
});

document.addEventListener("input", (e) => {
  if (e.target.id === "task-title-input") {
    state.newTaskTitle = e.target.value;
  } else if (e.target.id === "task-reminder-input") {
    state.newTaskReminder = e.target.value;
  } else if (e.target.id === "task-note-input") {
    state.newTaskNote = e.target.value;
  } else if (e.target.id === "task-date-input") {
    state.newTaskDate = e.target.value;
  } else if (e.target.id === "date-picker-input") {
    if (e.target.value) {
      state.currentDate = isoToDate(e.target.value);
      render();
    }
  }
});

document.addEventListener("keydown", (e) => {
  if (e.target.id === "task-title-input" && e.key === "Enter") {
    addTask();
  }
});

// Réveille l'audio à la première interaction
window.addEventListener("click", ensureAudioContext, { once: true });
window.addEventListener("keydown", ensureAudioContext, { once: true });

// =============== DÉMARRAGE ===============
loadFromStorage();
render();
checkReminders();
reminderInterval = setInterval(checkReminders, 30000);
</script>

</body>
</html>
